---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: global-hsts
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: kgateway-gateway
  config:
    responseHeaderModifier:
      add:
        - name: "Strict-Transport-Security"
          value: "max-age=31536000; includeSubDomains; preload"
