---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kgateway-gateway-internal
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      group: gateway.kgateway.dev
      kind: GatewayParameters
      name: kgateway-gateway-internal-service-parameters
  allowedListeners:
    namespaces:
      from: All
  listeners:
    - name: http-80
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    # - name: https-443
    #   protocol: HTTPS
    #   port: 443
    #   allowedRoutes:
    #     namespaces:
    #       from: All
    # - name: https-443-passthrough-muehlbachler-io
    #   protocol: TLS
    #   port: 443
    #   hostname: "*.muehlbachler.io"
    #   tls:
    #     mode: Passthrough
    #   allowedRoutes:
    #     namespaces:
    #       from: All
    # - name: https-443-passthrough-muehlbachler-xyz
    #   protocol: TLS
    #   port: 443
    #   hostname: "*.muehlbachler.xyz"
    #   tls:
    #     mode: Passthrough
    #   allowedRoutes:
    #     namespaces:
    #       from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: kgateway-gateway-internal-listeners
  namespace: kgateway
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: kgateway-gateway-internal
    namespace: kgateway
  listeners:
    - name: https-443
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
    - name: https-443-passthrough-muehlbachler-io
      protocol: TLS
      port: 443
      hostname: "*.muehlbachler.io"
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: All
    - name: https-443-passthrough-muehlbachler-xyz
      protocol: TLS
      port: 443
      hostname: "*.muehlbachler.xyz"
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: All
