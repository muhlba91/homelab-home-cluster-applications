---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: influxdb-listeners
  annotations:
    cert-manager.io/cluster-issuer: "${INTERNAL_CLUSTER_ISSUER}"
spec:
  parentRef:
    name: kgateway-gateway-internal
    namespace: kgateway
  listeners:
    - name: https-influxdb
      protocol: HTTPS
      port: 443
      hostname: influxdb.${LOCAL_HOME_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - name: influxdb-tls-cert

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: influxdb
  annotations:
    external-dns.alpha.kubernetes.io/provider: internal
spec:
  parentRefs:
    - name: influxdb-listeners
      kind: ListenerSet
      group: gateway.networking.k8s.io
  hostnames:
    - influxdb.${LOCAL_HOME_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: influxdb
          port: 80
