---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: BackendConfigPolicy
metadata:
  name: omada-controller-backend-policy
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: omada-controller-web
  tls:
    insecureSkipVerify: true

---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: omada-controller-listeners
  annotations:
    cert-manager.io/cluster-issuer: "${PUBLIC_CLUSTER_ISSUER}"
spec:
  parentRef:
    name: kgateway-gateway-internal
    namespace: kgateway
  listeners:
    - name: https-omada-controller
      protocol: HTTPS
      port: 443
      hostname: omada.network.${LOCAL_HOME_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - name: omada-controller-tls-cert

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: omada-controller
  annotations:
    external-dns.alpha.kubernetes.io/provider: public
    external-dns.alpha.kubernetes.io/target: "${PUBLIC_IP}"
spec:
  parentRefs:
    - name: omada-controller-listeners
      kind: ListenerSet
      group: gateway.networking.k8s.io
  hostnames:
    - omada.network.${LOCAL_HOME_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: omada-controller-web
          port: 80
