---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: grafana-listeners
  annotations:
    cert-manager.io/cluster-issuer: "${PUBLIC_CLUSTER_ISSUER}"
spec:
  parentRef:
    name: kgateway-gateway
    namespace: kgateway
  listeners:
    - name: https-grafana
      protocol: HTTPS
      port: 443
      hostname: grafana.${LOCAL_HOME_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - name: grafana-tls-cert

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  annotations:
    external-dns.alpha.kubernetes.io/provider: public
    external-dns.alpha.kubernetes.io/target: "${PUBLIC_IP}"
spec:
  parentRefs:
    - name: grafana-listeners
      kind: ListenerSet
      group: gateway.networking.k8s.io
  hostnames:
    - grafana.${LOCAL_HOME_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: grafana
          port: 80
