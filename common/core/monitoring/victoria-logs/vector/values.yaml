---
role: Agent

customConfig:
  data_dir: /vector-data-dir
  api:
    enabled: false
    address: 0.0.0.0:8686
    playground: true
  sources:
    kubernetes_logs:
      # Kubernetes Logs using the built-in Kubernetes API (no file monitoring)
      type: kubernetes_logs
      ignore_older_secs: 600
      oldest_first: false
      read_from: end
      use_apiserver_cache: true
      namespace_annotation_fields:
        namespace_labels: ""
      node_annotation_fields:
        node_labels: ""
      pod_annotation_fields:
        container_id: ""
        container_image_id: ""
        pod_annotations: ""
        pod_ip: ""
        pod_ips: ""
        pod_node_name: ""
        pod_owner: ""
        pod_uid: ""
    mikrotik_syslog:
      # Old BSD Syslog (MikroTik)
      type: syslog
      address: 0.0.0.0:514
      mode: udp
    network_syslog:
      # RFC5424 Syslog (VyOS, Omada, OPNsense)
      type: syslog
      address: 0.0.0.0:515
      mode: udp
    linux_agents:
      # Vector-to-Vector (V2V) for Linux servers
      type: vector
      address: 0.0.0.0:6000
    internal_metrics:
      type: internal_metrics
  transforms:
    kubernetes_parser:
      type: remap
      inputs:
        - kubernetes_logs
      source: |
        if exists(.kubernetes.pod_labels) {
          new_labels = {}
          for_each(object!(.kubernetes.pod_labels)) -> |key, value| {
            if starts_with(key, "app.kubernetes.io/") {
              new_labels = set!(new_labels, [key], value)
            }
          }
          .kubernetes.pod_labels = new_labels
        }
        if is_string(.message) {
          .message = strip_ansi_escape_codes(string!(.message))
        }
        .stream = "kubernetes"
        .service = .kubernetes.pod_labels."app.kubernetes.io/name" || "unknown-service"
        .pod = .kubernetes.pod_name || "unknown-pod"
        .log = parse_json(.message) ?? .message
        del(.message)
        del(.kubernetes.pod_annotations)
    mikrotik_parser:
      type: remap
      inputs:
        - mikrotik_syslog
      source: |
        .stream = "mikrotik"
        appname_parts = split(string!(.appname) || "routeros", ",")
        raw_level = if length(appname_parts) > 1 {
          downcase(string!(appname_parts[1]))
        } else {
          "info"
        }
        level_map = {
          "debug":     "debug",
          "info":      "info",
          "notice":    "info",
          "warning":   "warn",
          "error":     "error",
          "critical":  "crit",
          "alert":     "crit",
          "emergency": "crit"
        }
        .level = get(level_map, [raw_level]) ?? "info"
        .topics = [appname_parts[0]]
        .service = appname_parts[0] || "routeros"
        .hostname = string!(.host)
        .host = string!(.source_ip) || .hostname
        .log = .message
        del(.message)
        del(.appname)
        del(.facility)
        del(.severity)
    network_parser:
      type: remap
      inputs:
        - network_syslog
      source: |
        if starts_with(string!(.host), "${ROUTER_CIDR_PREFIX}") {
          .stream = "router"
        } else if starts_with(string!(.host), "${WIFI_CIDR_PREFIX}") {
          .stream = "wifi"
        } else {
          .stream = "network-general"
        }
        .service = .appname || "network-device"
        .log = .message
        del(.message)
    linux_parser:
      type: remap
      inputs:
        - linux_agents
      source: |
        .stream = "linux"
        .service = ._SYSTEMD_UNIT || .appname || "system"
        .host = .host || ._HOSTNAME
        .log = .message || .msg || "no message"
  sinks:
    exporter:
      type: prometheus_exporter
      address: 0.0.0.0:9090
      inputs:
        - internal_metrics
    vlogs:
      type: elasticsearch
      endpoints:
        - http://victoria-logs-server:9428/insert/elasticsearch/
      inputs:
        - kubernetes_parser
        - mikrotik_parser
        - network_parser
        - linux_parser
      mode: bulk
      api_version: v8
      compression: gzip
      healthcheck:
        enabled: false
      buffer:
        type: disk
        when_full: drop_newest
        max_size: 1073741824
      request:
        headers:
          VL-Time-Field: timestamp,_time
          VL-Stream-Fields: stream,host,service,level,kubernetes.pod_namespace,pod
          VL-Msg-Field: message,msg,_msg,log.msg,log.message,log
          VL-Level-Field: level
          AccountID: "0"
          ProjectID: "0"

containerPorts:
  - name: prom-exporter
    containerPort: 9090
    protocol: TCP
  - name: mikrotik-syslog
    containerPort: 514
    protocol: UDP
  - name: network-syslog
    containerPort: 515
    protocol: UDP
  - name: linux-v2v
    containerPort: 6000
    protocol: TCP

service:
  type: ClusterIP
  ipFamilyPolicy: PreferDualStack
  ports:
    - name: prom-exporter
      port: 9090
      protocol: TCP
      targetPort: 9090

persistence:
  enabled: false
  hostPath:
    enabled: false

resources:
  requests:
    cpu: 30m
    memory: 384Mi
  limits:
    memory: 1Gi
