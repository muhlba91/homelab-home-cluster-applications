---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: emqx-dashboard-listeners
  annotations:
    cert-manager.io/cluster-issuer: "${INTERNAL_CLUSTER_ISSUER}"
spec:
  parentRef:
    name: kgateway-gateway-internal
    namespace: kgateway
  listeners:
    - name: https-emqx-dashboard
      protocol: HTTPS
      port: 443
      hostname: emqx.iot.${LOCAL_INTERNAL_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - name: home-assistant-emqx-tls-cert

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: emqx-dashboard
  annotations:
    external-dns.alpha.kubernetes.io/hostname: &domain adguard.${LOCAL_INTERNAL_DOMAIN}
    external-dns.alpha.kubernetes.io/provider: internal
spec:
  parentRefs:
    - name: adguard-listeners
      kind: ListenerSet
      group: gateway.networking.k8s.io
  hostnames:
    - *domain
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: emqx
          port: 18083
