---
fullnameOverride: emqx

envFromSecret: home-assistant-emqx

replicaCount: 1

service:
  annotations:
    gatus.home-operations.com/enabled: "true"

ingress:
  dashboard:
    enabled: false

persistence:
  enabled: true
  storageClassName: ${DEFAULT_STORAGE_CLASS}
  accessMode: ReadWriteOnce
  size: 512Mi

ssl:
  enabled: true
  useExisting: true
  existingName: emqx-tls

resources:
  requests:
    cpu: 10m
    memory: 384Mi
  limits:
    memory: 384Mi
