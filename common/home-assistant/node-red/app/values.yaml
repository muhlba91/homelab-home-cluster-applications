---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/common-4.2.0/charts/library/common/values.schema.json
global:
  alwaysAppendIdentifierToResourceName: true

controllers:
  main:
    type: statefulset
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      node-red:
        image:
          repository: ghcr.io/muhlba91/node-red
          pullPolicy: IfNotPresent
          tag: v5.1.6

        env:
          - name: TZ
            value: UTC
          - name: NODE_RED_ENABLE_PROJECTS
            value: false
          - name: FLOWS
            value: flows.json
          - name: NODE_RED_URL
            valueFrom:
              configMapKeyRef:
                name: node-red-config
                key: url

        envFrom:
          - secretRef:
              name: node-red-credentials

        probes:
          startup:
            spec:
              initialDelaySeconds: 30
              periodSeconds: 15
              failureThreshold: 90
          readiness:
            enabled: true
            spec:
              initialDelaySeconds: 10
          liveness:
            enabled: true
            spec:
              initialDelaySeconds: 10

        resources:
          requests:
            cpu: 10m
            memory: 208Mi
          # necessary for yarn!
          limits:
            memory: 1Gi

    initContainers:
      init-chown-data:
        image:
          repository: alpine
          tag: 3.23
          pullPolicy: IfNotPresent
        command:
          - chown
          - "-R"
          - "1000:0"
          - /data
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 32Mi
        securityContext:
          capabilities:
            add:
              - CHOWN
      init-chown-node-modules:
        image:
          repository: alpine
          tag: 3.23
          pullPolicy: IfNotPresent
        command:
          - chown
          - "-R"
          - "1000:0"
          - /node_modules
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 32Mi
        securityContext:
          capabilities:
            add:
              - CHOWN

  backup:
    type: cronjob
    serviceAccount:
      identifier: home-assistant-node-red
    cronjob:
      concurrencyPolicy: Replace
      schedule: 0 0 * * *
      successfulJobsHistory: 3
      failedJobsHistory: 3
      startingDeadlineSeconds: 30
      backoffLimit: 2
    pod:
      restartPolicy: OnFailure
    containers:
      backup:
        image:
          repository: python
          tag: 3.14-alpine
          pullPolicy: IfNotPresent
        command:
          - /scripts/backup_restore.sh
        envFrom:
          - secretRef:
              name: node-red-backup
          - secretRef:
              name: node-red-credentials
        resources:
          requests:
            cpu: 20m
            memory: 160Mi
          limits:
            cpu: "1"
            memory: 320Mi

serviceAccount:
  home-assistant-node-red: {}

service:
  node-red:
    controller: main
    annotations:
      gatus.home-operations.com/enabled: "true"
    ipFamilyPolicy: PreferDualStack
    ports:
      http:
        port: 1880

route:
  node-red:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: ListenerSet
        namespace: ${APPLICATION_NAMESPACE}
        name: home-assistant-node-red-listeners
    hostnames:
      - &domain node-red.iot.${LOCAL_INTERNAL_DOMAIN}
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: node-red
            port: 1880
rawResources:
  listeners:
    apiVersion: gateway.networking.k8s.io/v1
    kind: ListenerSet
    annotations:
      cert-manager.io/cluster-issuer: "${INTERNAL_CLUSTER_ISSUER}"
    spec:
      spec:
        parentRef:
          name: kgateway-gateway-internal
          namespace: kgateway
        listeners:
          - name: https-home-assistant-node-red
            protocol: HTTPS
            port: 443
            hostname: *domain
            tls:
              mode: Terminate
              certificateRefs:
                - name: home-assistant-node-red-tls-cert

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ${DEFAULT_STORAGE_CLASS}
    accessMode: ReadWriteOnce
    size: 1Gi
    retain: false
  node-modules:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ${DEFAULT_STORAGE_CLASS}
    accessMode: ReadWriteOnce
    size: 1Gi
    retain: false
    advancedMounts:
      main:
        node-red:
          - path: /usr/src/node-red/node_modules
        init-chown-node-modules:
          - path: /node_modules
  packages:
    enabled: true
    type: configMap
    name: node-red-config
    globalMounts:
      - path: /init
  scripts:
    enabled: true
    type: configMap
    name: node-red-scripts
    defaultMode: 511
    advancedMounts:
      backup:
        backup:
          - path: /scripts
