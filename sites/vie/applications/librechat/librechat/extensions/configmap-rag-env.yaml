---
apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-rag-env
data:
  # DATABASE
  DB_HOST: librechat-postgresql-rw
  DB_PORT: "5432"
  POSTGRES_DB: librechat-rag
  COLLECTION_NAME: librechatrag
  # EMBEDDINGS
  EMBEDDINGS_PROVIDER: openai
  RAG_API_URL: http://litellm.litellm:4000/v1/embeddings
  RAG_OPENAI_BASEURL: http://litellm.litellm:4000
  EMBEDDINGS_MODEL: gemini-embedding-2-preview
  # FILE PROCESSING
  RAG_UPLOAD_DIR: /app/uploads/
  PDF_EXTRACT_IMAGES: "true"
  # PERFORMANCE
  CHUNK_SIZE: "1000"
  CHUNK_OVERLAP: "100"
