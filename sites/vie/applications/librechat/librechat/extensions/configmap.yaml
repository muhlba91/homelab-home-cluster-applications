---
apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
data:
  librechat.yaml: |
    version: 1.3.8
    cache: true

    fileStrategy: s3

    fileConfig:
      endpoints:
        default:
          fileSizeLimit: 10
          totalSizeLimit: 100
      serverFileSizeLimit: 100
      avatarSizeLimit: 4

    rateLimits:
      fileUploads:
        ipMax: 100
        ipWindowInMinutes: 60
        userMax: 50
        userWindowInMinutes: 60

    registration:
      socialLogins:
        - openid
      allowedDomains:
        - "muehlbachler.io"

    transactions:
      enabled: true

    memory:
      disabled: true

    ocr:
      mistralModel: mistral-ocr-latest
      baseURL: http://litellm.litellm:4000/v1
      apiKey: "$${LITELLM_API_KEY}"
      strategy: mistral_ocr

    webSearch:
      searchProvider: serper
      serperApiKey: "$${SERPER_API_KEY}"
      rerankerType: jina
      jinaApiKey: "$${JINA_API_KEY}"
      safeSearch: 0

    endpoints:
      agents:
        recursionLimit: 50
        maxRecursionLimit: 100
        disableBuilder: false
        maxCitations: 30
        maxCitationsPerFile: 7
        minRelevanceScore: 0.45

      custom:
        - name: LiteLLM OpenAI
          apiKey:  user_provided
          baseURL: http://litellm.litellm:4000/v1
          iconURL: /assets/openai.svg
          models:
            default:
              - openai/gpt-5.4
              - openai/gpt-5.4-mini
              - openai/gpt-5.4-nano
            fetch: false
          titleConvo: true
          titleModel: gemini-3.1-flash-lite-preview
          titleMethod: completion
          dropParams:
            - metadata
            - store
            - vector_store_ids

        - name: LiteLLM Anthropic
          apiKey:  user_provided
          baseURL: http://litellm.litellm:4000/v1
          iconURL: /assets/anthropic.svg
          models:
            default:
              - anthropic/claude-haiku-4-5
              - anthropic/claude-opus-4-7
              - anthropic/claude-sonnet-4-7
            fetch: false
          titleConvo: true
          titleModel: gemini-3.1-flash-lite-preview
          titleMethod: completion

        - name: LiteLLM Mistral
          apiKey:  user_provided
          baseURL: http://litellm.litellm:4000/v1
          iconURL: /assets/mistral.svg
          models:
            default:
              - mistral/mistral-large-latest
              - mistral/mistral-medium-latest
              - mistral/mistral-small-latest
            fetch: false
          titleConvo: true
          titleModel: gemini-3.1-flash-lite-preview
          titleMethod: completion

        - name: LiteLLM
          modelDisplayLabel: Model Proxy
          apiKey:  user_provided
          baseURL: http://litellm.litellm:4000/v1
          iconURL: https://raw.githubusercontent.com/BerriAI/litellm/main/docs/my-website/img/favicon.png
          models:
            default:
              - codestral-latest
              - devstral-latest
              - devstral-medium-latest
              - devstral-small-latest
              - gemini-3-flash-preview
              - gemini-3.1-flash-lite-preview
              - gemini-3.1-pro-preview
              - gemini-embedding-2-preview
              - gemma4
              - mistral-ocr-latest
              - qwen3.5
            fetch: true
          titleConvo: true
          titleModel: gemini-3.1-flash-lite-preview
          titleMethod: completion
