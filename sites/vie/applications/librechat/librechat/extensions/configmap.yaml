---
apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
data:
  librechat.yaml: |
    version: 1.3.8
    cache: true

    fileStrategy: s3

    fileConfig:
      endpoints:
        default:
          fileSizeLimit: 10
          totalSizeLimit: 100
      serverFileSizeLimit: 100
      avatarSizeLimit: 4

    rateLimits:
      fileUploads:
        ipMax: 100
        ipWindowInMinutes: 60
        userMax: 50
        userWindowInMinutes: 60

    registration:
      socialLogins:
        - openid
      allowedDomains:
        - "muehlbachler.io"

    interface:
      prompts:
        use: true
        create: true
        share: true
      agents:
        use: true
        create: true
        share: true
      temporaryChatRetention: 168
      marketplace:
        use: true

    transactions:
      enabled: true

    memory:
      disabled: true

    # summarization:
    #   provider: Model Proxy
    #   model: gemini-3.1-flash-lite-preview
    #   maxSummaryTokens: 4096
    #   reserveRatio: 0.1
    #   trigger:
    #     type: token_ratio
    #     value: 0.8
    #   contextPruning:
    #     enabled: true
    #     keepLastAssistants: 3
    #     softTrimRatio: 0.3
    #     hardClearRatio: 0.5
    #     minPrunableToolChars: 50000
    #     softTrim:
    #       maxChars: 4000
    #       headChars: 1500
    #       tailChars: 1500
    #     hardClear:
    #       enabled: true
    #       placeholder: "[Old tool result content cleared]"

    ocr:
      mistralModel: mistral-ocr-latest
      baseURL: http://litellm.litellm:4000/v1
      apiKey: "$${LITELLM_API_KEY}"
      strategy: mistral_ocr

    webSearch:
      searchProvider: serper
      serperApiKey: "$${SERPER_API_KEY}"
      rerankerType: jina
      jinaApiKey: "$${JINA_API_KEY}"
      safeSearch: 0

    endpoints:
      agents:
        recursionLimit: 50
        maxRecursionLimit: 100
        disableBuilder: false
        maxCitations: 30
        maxCitationsPerFile: 7
        minRelevanceScore: 0.45

      custom:
        - name: Model Proxy
          modelDisplayLabel: Model Proxy
          apiKey:  user_provided
          baseURL: http://litellm.litellm:4000/v1
          iconURL: https://raw.githubusercontent.com/BerriAI/litellm/main/docs/my-website/img/favicon.png
          models:
            default:
              - claude-haiku-4-5
              - claude-opus-4-6
              - claude-sonnet-4-6
              - codestral-latest
              - devstral-latest
              - devstral-medium-latest
              - devstral-small-latest
              - gemini-3-flash-preview
              - gemini-3.1-flash-lite-preview
              - gemini-3.1-pro-preview
              - gemini-embedding-2-preview
              - gemma4
              - gpt-5.4
              - gpt-5.4-mini
              - gpt-5.4-nano
              - mistral-large-latest
              - mistral-medium-latest
              - mistral-ocr-latest
              - mistral-small-latest
              - qwen3.5
            fetch: false
          titleConvo: true
          titleModel: gemini-3.1-flash-lite-preview
          titleMethod: completion
