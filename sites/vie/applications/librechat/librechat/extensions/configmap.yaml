---
apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
data:
  librechat.yaml: |
    version: 1.3.8
    cache: true

    fileStrategy: s3

    fileConfig:
      endpoints:
        default:
          fileSizeLimit: 10
          totalSizeLimit: 100
      serverFileSizeLimit: 100
      avatarSizeLimit: 4

    rateLimits:
      fileUploads:
        ipMax: 100
        ipWindowInMinutes: 60
        userMax: 50
        userWindowInMinutes: 60

    registration:
      socialLogins:
        - openid
      allowedDomains:
        - "muehlbachler.io"

    transactions:
      enabled: true

    memory:
      disabled: false
      messageWindowSize: 8
      validKeys:
        - user_preferences
        - learned_facts
        - project_details
        - tech_stack
      agent:
        provider: LiteLLM
        model: gemini-3.1-flash-lite-preview
        model_parameters:
          temperature: 0.1
          max_tokens: 1000
          top_p: 0.1

    ocr:
      mistralModel: mistral-ocr-latest
      baseURL: http://litellm.litellm:4000/v1
      apiKey: "$${LITELLM_API_KEY}"
      strategy: mistral_ocr

    webSearch:
      searchProvider: serper
      serperApiKey: "$${SERPER_API_KEY}"
      rerankerType: jina
      jinaApiKey: "$${JINA_API_KEY}"
      safeSearch: 0

    mcpServers:
      memory:
        command: npx
        args:
          - "@modelcontextprotocol/server-memory"
        startup: false
        initTimeout: 15000

      home-assistant:
        type: streamable-http
        url: https://jarvis.${LOCAL_HOME_DOMAIN}/api/mcp
        oauth:
          authorization_url: https://jarvis.${LOCAL_HOME_DOMAIN}/auth/authorize
          token_url: https://jarvis.${LOCAL_HOME_DOMAIN}/auth/token
          client_id: https://gpt.${HOME_DOMAIN}
          redirect_uri: https://gpt.${HOME_DOMAIN}/api/mcp/home-assistant/oauth/callback
          scope: "read execute"
        startup: false
        initTimeout: 15000

      github:
        type: streamable-http
        url: "https://api.githubcopilot.com/mcp/"
        headers:
          Authorization: "Bearer {{PAT_TOKEN}}"
        customUserVars:
          PAT_TOKEN:
            title: "GitHub PAT Token"
            description: "GitHub Personal Access Token"
        startup: false
        initTimeout: 30000

    modelSpecs:
      enforce: false
      prioritize: true
      list:
        # OPENAI
        - name: gpt-5
          label: GPT-5
          group: OpenAI
          preset:
            endpoint: LiteLLM OpenAI
            model: openai/gpt-5.4
        - name: gpt-5-mini
          label: GPT-5 Mini
          group: OpenAI
          preset:
            endpoint: LiteLLM OpenAI
            model: openai/gpt-5.4-mini
        - name: gpt-5-nano
          label: GPT-5 Nano
          group: OpenAI
          preset:
            endpoint: LiteLLM OpenAI
            model: openai/gpt-5.4-nano
        # ANTHROPIC
        - name: claude-haiku-4
          label: Claude Haiku 4
          group: Anthropic
          preset:
            endpoint: LiteLLM Anthropic
            model: anthropic/claude-haiku-4-5
        - name: claude-opus-4
          label: Claude Opus 4
          group: Anthropic
          preset:
            endpoint: LiteLLM Anthropic
            model: anthropic/claude-opus-4-7
        - name: claude-sonnet-4
          label: Claude Sonnet 4
          group: Anthropic
          preset:
            endpoint: LiteLLM Anthropic
            model: anthropic/claude-sonnet-4-7
        # MISTRAL
        - name: mistral-large
          label: Mistral Large
          group: Mistral
          preset:
            endpoint: LiteLLM Mistral
            model: mistral/mistral-large-latest
        - name: mistral-medium
          label: Mistral Medium
          group: Mistral
          preset:
            endpoint: LiteLLM Mistral
            model: mistral/mistral-medium-latest
        - name: mistral-small
          label: Mistral Small
          group: Mistral
          preset:
            endpoint: LiteLLM Mistral
            model: mistral/mistral-small-latest

    endpoints:
      agents:
        recursionLimit: 50
        maxRecursionLimit: 100
        disableBuilder: false
        maxCitations: 30
        maxCitationsPerFile: 7
        minRelevanceScore: 0.45

      custom:
        - name: LiteLLM OpenAI
          apiKey:  user_provided
          baseURL: http://litellm.litellm:4000/v1
          iconURL: /assets/openai.svg
          models:
            default:
              - openai/gpt-5.4
              - openai/gpt-5.4-mini
              - openai/gpt-5.4-nano
            fetch: false
          titleConvo: true
          titleModel: gemini-3.1-flash-lite-preview
          titleMethod: completion

        - name: LiteLLM Anthropic
          apiKey:  user_provided
          baseURL: http://litellm.litellm:4000/v1
          iconURL: /assets/anthropic.svg
          models:
            default:
              - anthropic/claude-haiku-4-5
              - anthropic/claude-opus-4-7
              - anthropic/claude-sonnet-4-7
            fetch: false
          titleConvo: true
          titleModel: gemini-3.1-flash-lite-preview
          titleMethod: completion

        - name: LiteLLM Mistral
          apiKey:  user_provided
          baseURL: http://litellm.litellm:4000/v1
          iconURL: /assets/mistral.svg
          models:
            default:
              - mistral/mistral-large-latest
              - mistral/mistral-medium-latest
              - mistral/mistral-small-latest
            fetch: false
          titleConvo: true
          titleModel: gemini-3.1-flash-lite-preview
          titleMethod: completion

        - name: LiteLLM
          modelDisplayLabel: Model Proxy
          apiKey:  user_provided
          baseURL: http://litellm.litellm:4000/v1
          iconURL: https://raw.githubusercontent.com/BerriAI/litellm/main/docs/my-website/img/favicon.png
          models:
            default:
              - codestral-latest
              - devstral-latest
              - devstral-medium-latest
              - devstral-small-latest
              - gemini-3-flash-preview
              - gemini-3.1-flash-lite-preview
              - gemini-3.1-pro-preview
              - gemini-embedding-2-preview
              - gemma4
              - mistral-ocr-latest
              - qwen3.5
            fetch: true
          titleConvo: true
          titleModel: gemini-3.1-flash-lite-preview
          titleMethod: completion
