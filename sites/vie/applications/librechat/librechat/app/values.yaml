---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/common-5.0.0/charts/library/common/values.schema.json
global:
  alwaysAppendIdentifierToResourceName: true

controllers:
  main:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      librechat:
        image:
          repository: ghcr.io/danny-avila/librechat
          pullPolicy: IfNotPresent
          tag: v0.8.5

        envFrom:
          - configMapRef:
              name: librechat-env
          - secretRef:
              name: librechat-secrets
          - secretRef:
              name: librechat-meilisearch-master-key

        env:
          - name: MONGO_URI
            value: mongodb://librechat-mongodb:27017/librechat

        resources:
          requests:
            cpu: 10m
            memory: 768Mi
          limits:
            memory: 768Mi

        probes: &probes
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              periodSeconds: 5

    initContainers:
      init-chown-images:
        image:
          repository: alpine
          tag: 3.23
          pullPolicy: IfNotPresent
        command:
          - chown
          - "-R"
          - "1000:1000"
          - /app/client/public/images
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 32Mi
        securityContext:
          capabilities:
            add:
              - CHOWN
      init-chown-uploads:
        image:
          repository: alpine
          tag: 3.23
          pullPolicy: IfNotPresent
        command:
          - chown
          - "-R"
          - "1000:1000"
          - /app/uploads
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 32Mi
        securityContext:
          capabilities:
            add:
              - CHOWN

  rag-api:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      api:
        image:
          repository: ghcr.io/danny-avila/librechat-rag-api-dev-lite
          pullPolicy: IfNotPresent
          tag: v0.8.0

        envFrom:
          - configMapRef:
              name: librechat-rag-env
          - secretRef:
              name: librechat-rag-secrets

        env:
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: librechat-database
                key: username
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: librechat-database
                key: password

        resources:
          requests:
            cpu: 10m
            memory: 768Mi
          limits:
            memory: 768Mi

        probes: *probes

service:
  librechat:
    controller: main
    annotations:
      gatus.home-operations.com/enabled: "true"
    # ipFamilyPolicy: PreferDualStack
    ports:
      http:
        port: 3080
  rag-api:
    controller: rag-api
    # ipFamilyPolicy: PreferDualStack
    ports:
      http:
        port: 8000

route:
  librechat:
    enabled: true
    kind: HTTPRoute
    annotations:
      external-dns.alpha.kubernetes.io/provider: public
      external-dns.alpha.kubernetes.io/target: "${PUBLIC_IP}"
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: ListenerSet
        namespace: ${APPLICATION_NAMESPACE}
        name: librechat-listeners
    hostnames:
      - &domain chat.ai.${HOME_DOMAIN}
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: librechat
            port: 3080
rawResources:
  listeners:
    manifest:
      apiVersion: gateway.networking.k8s.io/v1
      kind: ListenerSet
      metadata:
        annotations:
          cert-manager.io/cluster-issuer: "${PUBLIC_CLUSTER_ISSUER}"
      spec:
        parentRef:
          name: kgateway-gateway
          namespace: kgateway
        listeners:
          - name: https-librechat
            protocol: HTTPS
            port: 443
            hostname: *domain
            tls:
              mode: Terminate
              certificateRefs:
                - name: librechat-tls-cert

persistence:
  images:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ${DEFAULT_STORAGE_CLASS}
    accessMode: ReadWriteOnce
    size: 10Gi
    advancedMounts:
      main:
        librechat:
          - path: /app/client/public/images
        init-chown-images:
          - path: /app/client/public/images
  uploads:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ${DEFAULT_STORAGE_CLASS}
    accessMode: ReadWriteOnce
    size: 10Gi
    advancedMounts:
      main:
        librechat:
          - path: /app/uploads
        init-chown-uploads:
          - path: /app/uploads
      rag-api:
        api:
          - path: /app/uploads
  config:
    enabled: true
    type: configMap
    name: librechat-config
    defaultMode: 511
    advancedMounts:
      main:
        librechat:
          - path: /app/librechat.yaml
            subPath: librechat.yaml
