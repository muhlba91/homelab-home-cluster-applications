---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &application agents-mcp-server-victoria-metrics
  namespace: flux-system
spec:
  sourceRef:
    kind: GitRepository
    name: cluster-applications
  path: ./sites/vie/applications/agents/mcp-server/victoria-metrics/
  interval: 10m
  retryInterval: 2m
  prune: true
  force: false
  wait: false
  postBuild:
    substitute:
      APPLICATION: *application
      APPLICATION_NAMESPACE: agents
