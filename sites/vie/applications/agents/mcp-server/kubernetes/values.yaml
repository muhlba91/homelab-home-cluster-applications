---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/common-4.2.0/charts/library/common/values.schema.json
controllers:
  main:
    annotations:
      reloader.stakater.com/auto: "true"
    serviceAccount:
      identifier: mcp-server-kubernetes
    containers:
      server:
        image:
          repository: ghcr.io/containers/kubernetes-mcp-server
          pullPolicy: IfNotPresent
          tag: v0.0.60

        args:
          - --config
          - /etc/kubernetes-mcp-server/config.toml

        probes:
          liveness: &probe
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probe

        resources:
          requests:
            cpu: 5m
            memory: 24Mi
          limits:
            memory: 96Mi

service:
  mcp-server-kubernetes:
    controller: main
    annotations:
      gatus.home-operations.com/enabled: "true"
    ipFamilyPolicy: PreferDualStack
    ports:
      http:
        port: 8080

serviceAccount:
  mcp-server-kubernetes:
    enabled: true
rbac:
  roles:
    mcp-kubernetes-readonly:
      enabled: true
      type: ClusterRole
      rules:
        - apiGroups:
            - ""
          resources:
            - pods
            - services
            - nodes
            - namespaces
            - configmaps
            - persistentvolumeclaims
          verbs:
            - get
            - list
            - watch
        - apiGroups:
            - apps
          resources:
            - deployments
            - statefulsets
            - daemonsets
            - replicasets
          verbs:
            - get
            - list
            - watch
        - apiGroups:
            - batch
          resources:
            - jobs
            - cronjobs
          verbs:
            - get
            - list
            - watch
        - apiGroups:
            - networking.k8s.io
          resources:
            - ingresses
          verbs:
            - get
            - list
            - watch
        - apiGroups:
            - gateway.networking.k8s.io
          resources:
            - gateways
            - httproutes
            - tcproutes
            - listenersets
          verbs:
            - get
            - list
            - watch
        - apiGroups:
            - source.toolkit.fluxcd.io
          resources:
            - gitrepositories
            - helmcharts
            - helmrepositories
            - ocirepositories
          verbs:
            - get
            - list
            - watch
        - apiGroups:
            - helm.toolkit.fluxcd.io
          resources:
            - helmreleases
          verbs:
            - get
            - list
            - watch
        - apiGroups:
            - kustomize.toolkit.fluxcd.io
          resources:
            - kustomizations
          verbs:
            - get
            - list
            - watch
        - apiGroups:
            - apiextensions.k8s.io
          resources:
            - customresourcedefinitions
          verbs:
            - get
            - list
            - watch
  bindings:
    mcp-kubernetes-readonly:
      enabled: true
      type: ClusterRoleBinding
      roleRef:
        kind: ClusterRole
        identifier: mcp-kubernetes-readonly
      subjects:
        - identifier: mcp-server-kubernetes

persistence:
  config:
    enabled: true
    type: configMap
    name: mcp-server-kubernetes-config
    defaultMode: 511
    advancedMounts:
      main:
        server:
          - path: /etc/kubernetes-mcp-server/config.toml
            subPath: config.toml
  config-dir:
    enabled: true
    type: emptyDir
    advancedMounts:
      main:
        server:
          - path: /etc/kubernetes-mcp-server/conf.d
