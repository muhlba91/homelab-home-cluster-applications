---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/common-4.2.0/charts/library/common/values.schema.json
controllers:
  main:
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      init:
        image:
          repository: alpine
          tag: 3.23
          pullPolicy: IfNotPresent
        command:
          - /scripts/sync.sh
        env:
          - name: DATA_PATH
            value: /etc/picoclaw
          - name: AGENT_ID
            value: opsbot
        envFrom:
          - configMapRef:
              name: agents-git-repo
        resources:
          requests:
            cpu: 10m
            memory: 8Mi
          limits:
            cpu: 50m
            memory: 8Mi
    containers:
      server:
        image:
          repository: ghcr.io/sipeed/picoclaw
          pullPolicy: IfNotPresent
          tag: v0.2.6

        args:
          - gateway

        env:
          - name: PICOCLAW_CONFIG
            value: /etc/picoclaw/config.json
          - name: TZ
            value: Etc/UTC
          - name: DATA_PATH
            value: /etc/picoclaw
          - name: AGENT_ID
            value: opsbot
        envFrom:
          - configMapRef:
              name: agents-git-repo
          - secretRef:
              name: bot-opsbot-picoclaw-secrets-env

        probes:
          liveness: &probe
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 18790
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probe

        resources:
          requests:
            cpu: 5m
            memory: 24Mi
          limits:
            memory: 64Mi

service:
  bot-opsbot-picoclaw:
    controller: main
    annotations:
      gatus.home-operations.com/enabled: "true"
    ipFamilyPolicy: PreferDualStack
    ports:
      gateway:
        port: 18790

persistence:
  workspace:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ${DEFAULT_STORAGE_CLASS}
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /etc/picoclaw
  scripts:
    enabled: true
    type: configMap
    name: agents-scripts
    defaultMode: 0o777
    globalMounts:
      - path: /scripts
