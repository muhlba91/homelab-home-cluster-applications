---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/common-4.2.0/charts/library/common/values.schema.json
controllers:
  main:
    annotations:
      reloader.stakater.com/auto: "true"
    serviceAccount:
      identifier: bot-opsbot
    initContainers:
      init:
        image:
          repository: alpine
          tag: 3.23
          pullPolicy: IfNotPresent
        command:
          - /scripts/sync.sh
        env:
          - name: DATA_PATH
            value: /root/.picoclaw
          - name: AGENT_ID
            value: opsbot
        envFrom: &envFrom
          - configMapRef:
              name: agents-git-repo
          - secretRef:
              name: bot-opsbot-picoclaw-secrets-env
        resources:
          requests:
            cpu: 5m
            memory: 24Mi
          limits:
            memory: 64Mi
    containers:
      server:
        image:
          repository: ghcr.io/sipeed/picoclaw
          pullPolicy: IfNotPresent
          tag: v0.2.6

        env:
          - name: PICOCLAW_CONFIG
            value: /root/.picoclaw/config.json
          - name: TZ
            value: Etc/UTC
          - name: DATA_PATH
            value: /root/.picoclaw
          - name: AGENT_ID
            value: opsbot
        envFrom: *envFrom

        probes:
          liveness: &probe
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 18790
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 2
              failureThreshold: 3
          readiness: *probe

        resources:
          requests:
            cpu: 5m
            memory: 24Mi
          limits:
            memory: 64Mi

service:
  bot-opsbot-picoclaw:
    controller: main
    annotations:
      gatus.home-operations.com/enabled: "true"
    ipFamilyPolicy: PreferDualStack
    ports:
      gateway:
        port: 18790

serviceAccount:
  bot-opsbot:
    enabled: true
rbac:
  roles:
    bot-opsbot-restart-self:
      enabled: true
      type: Role
      rules:
        - apiGroups:
            - apps
          resources:
            - deployments
          resourceNames:
            - agents-bot-opsbot-picoclaw
          verbs:
            - get
            - patch
  bindings:
    bot-opsbot-restart-self:
      enabled: true
      type: RoleBinding
      roleRef:
        kind: Role
        identifier: bot-opsbot-restart-self
      subjects:
        - identifier: bot-opsbot

persistence:
  workspace:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ${DEFAULT_STORAGE_CLASS}
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /root/.picoclaw
  scripts:
    enabled: true
    type: configMap
    name: agents-scripts
    defaultMode: 0o777
    globalMounts:
      - path: /scripts
