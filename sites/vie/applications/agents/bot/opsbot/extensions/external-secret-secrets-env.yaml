---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bot-opsbot-picoclaw-secrets-env
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-auth
  target:
    name: bot-opsbot-picoclaw-secrets-env
  data:
    - secretKey: GITHUB_MCP_TOKEN
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: agents-bot-opsbot-mcp-servers
        property: github
    - secretKey: LITELLM_API_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: agents-bot-opsbot-providers
        property: litellm
    - secretKey: PICOCLAW_CHANNELS_DISCORD_TOKEN
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: agents-bot-opsbot-channels
        property: discord
