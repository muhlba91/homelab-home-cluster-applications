---
replicaCount: 1
numWorkers: 1

strategy:
  type: Recreate

extraEnvVars:
  - name: LITELLM_MODE
    value: "PRODUCTION"
  - name: DOCS_URL
    value: "/docs"
  - name: ROOT_REDIRECT_URL
    value: "/ui"
  - name: PROXY_BASE_URL
    value: "https://proxy.ai.${LOCAL_INTERNAL_DOMAIN}"
  - name: BACKGROUND_HEALTH_CHECK_MAX_TOKENS
    value: "16"
  - name: ALLOWED_EMAIL_DOMAINS
    value: "muehlbachler.io"
  - name: GENERIC_SCOPES
    value: "openid email profile"
  - name: PROXY_ADMIN_ID
    value: daniel
  - name: AUTO_REDIRECT_UI_LOGIN_TO_SSO
    value: "true"
  - name: GENERIC_USER_ID_ATTRIBUTE
    value: "preferred_username"
  - name: GENERIC_USER_EMAIL_ATTRIBUTE
    value: "email"
  - name: GENERIC_USER_DISPLAY_NAME_ATTRIBUTE
    value: "name"
  - name: GENERIC_USER_FIRST_NAME_ATTRIBUTE
    value: "given_name"
  - name: GENERIC_USER_LAST_NAME_ATTRIBUTE
    value: "family_name"
  - name: GENERIC_USER_ROLE_ATTRIBUTE
    value: "grants"

environmentSecrets:
  - litellm-secrets-env
  - litellm-oidc

masterkeySecretName: litellm-secrets-env
masterkeySecretKey: LITELLM_MASTER_KEY

proxyConfigMap:
  create: false
  name: litellm-config
  key: config.yaml

db:
  useExisting: true
  deployStandalone: false
  endpoint: litellm-postgresql-rw
  database: litellm
  secret:
    name: litellm-database
    usernameKey: username
    passwordKey: password

redis:
  enabled: false

deploymentAnnotations:
  reloader.stakater.com/auto: "true"

migrationJob:
  enabled: false # also sets env vars for main container which then sets DISABLE_SCHEMA_UPDATE twice on the migration job
  hooks:
    argocd:
      enabled: false
    helm:
      enabled: true

route:
  litellm:
    enabled: true
    kind: HTTPRoute
    annotations:
      external-dns.alpha.kubernetes.io/provider: internal
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: ListenerSet
        namespace: ${APPLICATION_NAMESPACE}
        name: litellm-listeners
    hostnames:
      - &domain proxy.ai.${LOCAL_INTERNAL_DOMAIN}
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: litellm
            port: 8080
rawResources:
  listeners:
    apiVersion: gateway.networking.k8s.io/v1
    kind: ListenerSet
    annotations:
      cert-manager.io/cluster-issuer: "${INTERNAL_CLUSTER_ISSUER}"
    spec:
      spec:
        parentRef:
          name: kgateway-gateway-internal
          namespace: kgateway
        listeners:
          - name: https-litellm
            protocol: HTTPS
            port: 443
            hostname: *domain
            tls:
              mode: Terminate
              certificateRefs:
                - name: litellm-tls-cert

resources:
  requests:
    cpu: 20m
    memory: 1024Mi
  limits:
    memory: 1536Mi
