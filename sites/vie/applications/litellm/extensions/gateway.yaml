---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: litellm-listeners
  annotations:
    cert-manager.io/cluster-issuer: "${INTERNAL_CLUSTER_ISSUER}"
spec:
  parentRef:
    name: kgateway-gateway-internal
    namespace: kgateway
  listeners:
    - name: https-litellm
      protocol: HTTPS
      port: 443
      hostname: proxy.ai.${LOCAL_INTERNAL_DOMAIN}
      tls:
        mode: Terminate
        certificateRefs:
          - name: litellm-tls-cert

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: litellm
  annotations:
    external-dns.alpha.kubernetes.io/provider: internal
spec:
  parentRefs:
    - name: litellm-listeners
      kind: ListenerSet
      group: gateway.networking.k8s.io
  hostnames:
    - proxy.ai.${LOCAL_INTERNAL_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: litellm
          port: 4000
