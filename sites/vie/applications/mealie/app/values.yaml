---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/common-5.0.0/charts/library/common/values.schema.json
global:
  alwaysAppendIdentifierToResourceName: true

controllers:
  main:
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      annotations:
        backup.velero.io/backup-volumes: data
    containers:
      mealie:
        image:
          repository: ghcr.io/mealie-recipes/mealie
          pullPolicy: IfNotPresent
          tag: v3.17.0

        envFrom:
          - configMapRef:
              name: mealie-env
          - secretRef:
              name: mealie-oidc
          - secretRef:
              name: mealie-openai
          - secretRef:
              name: mealie-smtp

        env:
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: mealie-database
                key: username
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mealie-database
                key: password

        resources:
          requests:
            cpu: 10m
            memory: 512Mi
          limits:
            memory: 768Mi

        probes:
          liveness: &server_probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 9000
              initialDelaySeconds: 0
              periodSeconds: 30
              timeoutSeconds: 1
              failureThreshold: 5
          readiness: *server_probes
          startup:
            enabled: false

service:
  mealie:
    controller: main
    annotations:
      gatus.home-operations.com/enabled: "true"
    # ipFamilyPolicy: PreferDualStack
    ports:
      http:
        port: 9000

route:
  mealie:
    enabled: true
    kind: HTTPRoute
    annotations:
      external-dns.alpha.kubernetes.io/provider: public
      external-dns.alpha.kubernetes.io/target: "${PUBLIC_IP}"
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: ListenerSet
        namespace: ${APPLICATION_NAMESPACE}
        name: mealie-listeners
    hostnames:
      - &domain recipes.${HOME_DOMAIN}
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: mealie
            port: 9000
rawResources:
  listeners:
    manifest:
      apiVersion: gateway.networking.k8s.io/v1
      kind: ListenerSet
      metadata:
        annotations:
          cert-manager.io/cluster-issuer: "${PUBLIC_CLUSTER_ISSUER}"
      spec:
        parentRef:
          name: kgateway-gateway
          namespace: kgateway
        listeners:
          - name: https-mealie
            protocol: HTTPS
            port: 443
            hostname: *domain
            tls:
              mode: Terminate
              certificateRefs:
                - name: mealie-tls-cert

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ${DEFAULT_STORAGE_CLASS}
    accessMode: ReadWriteOnce
    size: 1Gi
    advancedMounts:
      main:
        mealie:
          - path: /app/data
