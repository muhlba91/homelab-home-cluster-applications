kind: Kustomization
metadata:
  name: not-used
spec:
  patches:
    - target:
        kind: HelmRelease
      patch: |-
        kind: HelmRelease
        metadata:
          name: not-used
        spec:
          postRenderers:
            - kustomize:
                patches:
                  - target:
                      version: v1
                      kind: Deployment
                      labelSelector: "app.kubernetes.io/controller=main,app.kubernetes.io/instance=frigate,app.kubernetes.io/name=frigate"
                    patch: |-
                      - op: replace
                        path: /spec/template/spec/containers/0/image
                        # renovate: datasource=docker packageName=ghcr.io/blakeblackshear/frigate
                        value: ghcr.io/blakeblackshear/frigate:0.17.0
                      - op: replace
                        path: /spec/template/spec/runtimeClassName
                        value: nvidia
                      - op: remove
                        path: /spec/template/spec/containers/0/resources/requests/nvidia.com~1gpu
                      - op: remove
                        path: /spec/template/spec/containers/0/resources/limits/nvidia.com~1gpu
